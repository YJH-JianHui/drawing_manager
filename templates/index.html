<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>图纸管理系统</title>
    <link rel="stylesheet" href="/public/index.css" />
    <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
    <script type="text/javascript" src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.16.js"></script>
    <!-- 在页面上添加VConsole方便调试-->
    <script src="https://unpkg.com/vconsole/dist/vconsole.min.js"></script>
    <script>
      var vConsole = new window.VConsole();
    </script>
  </head>

  <body>
    <div class="app-container">

      <!-- 顶部：用户信息卡片 (默认隐藏，JS读取成功后显示) -->
      <div id="user-info-card" class="user-card hidden">
        <img id="user-avatar" src="" alt="avatar">
        <div class="user-greeting">
          <h2 id="user-name">加载中...</h2>
          <p>欢迎使用图纸管理系统</p>
        </div>
      </div>

      <!-- 核心功能：网格菜单区域 -->
      <div class="menu-grid">

        <!-- 卡片1：图纸借出 -->
        <div class="menu-item" onclick="handleCheckout()">
          <div class="icon-wrapper checkout-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 13v4h-2v-4H8l4-4 4 4h-3zm1-9V3.5L18.5 9H14z"/></svg>
          </div>
          <h3>图纸借出</h3>
          <p>扫码借出图纸</p>
        </div>

        <!-- 卡片2：图纸归还 -->
        <div class="menu-item" onclick="handleReturn()">
          <div class="icon-wrapper return-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 11H8v2h5v3l4-4-4-4v3zm1-4V3.5L18.5 9H14z"/></svg>
          </div>
          <h3>图纸归还</h3>
          <p>扫码归还图纸</p>
        </div>

        <!-- 卡片3：统计分析 -->
        <div class="menu-item" onclick="handleStats()">
          <div class="icon-wrapper stats-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 20h16v2H4zM6 16h3v4H6zM11 10h3v10h-3zM16 6h3v14h-3z"/></svg>
          </div>
          <h3>统计分析</h3>
          <p>查看借阅数据</p>
        </div>

          <!-- 卡片4：系统设置 -->
        <div class="menu-item" onclick="handleSettings()">
          <div class="icon-wrapper settings-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
          </div>
          <h3>系统设置</h3>
          <p>权限与基础配置</p>
        </div>

      </div>
    </div>

    <script src="/public/index.js"></script>
  </body>
</html>
