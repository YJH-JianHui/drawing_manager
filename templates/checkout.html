<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>图纸借出录入</title>
  <link rel="stylesheet" href="/public/checkout.css" />
  <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
  <script src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.16.js"></script>
  <script src="https://unpkg.com/vconsole/dist/vconsole.min.js"></script>
  <script>var vConsole = new window.VConsole();</script>
</head>
<body>
  <div class="checkout-container">

    <!-- 顶部导航 -->
    <div class="header">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        返回
      </div>
      <h2>图纸借出</h2>
      <div style="width:60px;"></div>
    </div>

    <!-- 操作区：草稿列表 + 扫码 -->
    <div class="action-area">
      <button class="btn-draft-list" onclick="openDraftList()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1
                   7V3.5L18.5 9H13zm-1 9H7v-2h5v2zm3-4H7v-2h8v2zm0-4H7V8h8v2z"/>
        </svg>
        草稿
      </button>

      <button class="btn-scan" onclick="startScan()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
        </svg>
        扫码录入图纸
      </button>
    </div>

    <!-- 列表区 -->
    <div class="list-area">
      <div class="list-header">
        已加载借用单 &nbsp;|&nbsp; 共 <span id="record-count">0</span> 条明细
      </div>
      <div id="record-list">
        <div class="empty-tip">暂无数据，请扫码或点击【草稿】加载历史进度</div>
      </div>
    </div>

  </div>

  <script src="/public/checkout.js"></script>
</body>
</html>
