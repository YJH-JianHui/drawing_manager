<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>图纸查询</title>
  <link rel="stylesheet" href="/public/query.css" />
  <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
  <script type="text/javascript" src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.16.js"></script>
</head>
<body>
  <div class="query-container">
    <!-- 顶部搜索栏 -->
    <div class="search-header">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="输入图号或借用单号..." />
        <div class="scan-trigger" onclick="startQueryScan()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M7 21H5a2 2 0 0 1-2-2v-2M21 17v2a2 2 0 0 1-2 2h-2M3 12h18"/></svg>
        </div>
      </div>
      <button class="search-confirm" onclick="executeSearch()">搜索</button>
    </div>

    <!-- 结果展示区 -->
    <div id="result-area">
      <div class="empty-state">
        <img src="https://lf3-static.bytednsdoc.com/obj/eden-cn/ptp_jhc_yllo/obj/asf-base/empty_no_content.png" alt="empty" />
        <p>请输入关键词或扫码查询图纸状态</p>
      </div>
    </div>
  </div>
  <script src="/public/query.js"></script>
</body>
</html>
